<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <section class="left-section">
            <img src="images/background-image.jpg" class="bg-image">
            <p>Photo by Halie West on Unsplash</p>

            <div class="logo-container">
                <img src="images/odin.png" class="logo">
                <p>ODIN</p>
            </div>
        </section>

        <section class="right-section">
            <div class="top-container">
                <p>
                    This is not a real online service! You know you need
                    something like this in your life to help you realize
                    your deepest dreams.
                </p>

                <p>Sign up <span>now</span> to get started.</p>

                <p>You <span>know</span> you want to.</p>
            </div>

            <div class="middle-container">
                <div class="middle-header">
                    <h2>Let's do it!</h2>
                </div>

                <div class="form-container">
                    <div class="left-form">
                        <form action="">
                            <fieldset>
                                <label for="first-name">FIRST NAME</label>
                                <input type="text" id="first-name" name="first-name">
                                
                                <label for="email">EMAIL</label>
                                <input type="email" id="email" name="email">

                                <label for="user-password">PASSWORD</label>
                                <input type="password" id="user-password" name="password">
                            </fieldset>
                        </form>

                    </div>
                    
                    <div class="right-form">
                        <form action="">
                            <fieldset>
                                <label for="last-name">LAST NAME</label>
                                <input type="text" id="last-name" name="last-name">
                                
                                <label for="phoneno">PHONE NUMBER</label>
                                <input type="tel" id="phoneno" name="phoneno">

                                <label for="user-password">CONFIRM PASSWORD</label>
                                <input type="password" id="user-password" name="password">
                            </fieldset>
                        </form>
                        

                    </div>  
                </div>


            </div>
            
            <div class="bottom-container">
                <p></p>
            </div>
        </section>
    </div>

</body>
</html>
