<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <section class="left-section">
            <img src="images/background-image.jpg" class="bg-image">
            <p>Photo by <a href="">Halie West</a> on 
                <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">
                Unsplash</a></p>

            <div class="logo-container">
                <img src="images/odin.png" class="logo">
                <p>ODIN</p>
            </div>
        </section>

        <section class="right-section">
            <div class="top-container">
                <p>
                    This is not a real online service! You know you need
                    something like this in your life to help you realize
                    your deepest dreams.
                </p>

                <p>Sign up <span>now</span> to get started.</p>

                <p>You <span>know</span> you want to.</p>
            </div>

            <div class="middle-container">
                <form action="">
                    <fieldset>
                        <legend>Let's do this!</legend>
                        
                        <div class="form-container">
                            <div class="form-block">
                                <label for="first-name">FIRST NAME</label>
                                <input type="text" id="first-name" name="first-name" required />
                                
                                <label for="email">EMAIL</label>
                                <input type="email" id="email" name="email" placeholder="john@example.com" required />

                                <label for="user-password">PASSWORD</label>
                                <input type="password" id="user-password" name="password" required />
                            </div>

                            <div class="form-block">
                                <label for="last-name">LAST NAME</label>
                                <input type="text" id="last-name" name="last-name" required />
                                
                                <label for="phoneno">PHONE NUMBER</label>
                                <input type="tel" id="phoneno" name="phoneno" required />

                                <label for="user-password">CONFIRM PASSWORD</label>
                                <input type="password" id="user-password" name="password" required />
                            </div>
                        </div>
                        
                        <div class="submit-container">
                            <button type="submit">Create Account</button>

                            <p>Already have an account? <a href="">Log in</a></p>
                        </div>
                    </fieldset>
                </form>
            </div>
        </section>
    </div>

</body>
</html>
